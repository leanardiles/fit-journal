{% extends 'base.html' %}

{% block extra_css %}
<style>
    .nb-wod-table {
        width: 100%;
        border-collapse: collapse;
    }

    .nb-wod-table th {
        height: var(--lh);
        text-align: left;
        padding-bottom: 4px;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1.2px;
        font-weight: normal;
        vertical-align: bottom;
    }

    .nb-wod-table th.center { text-align: center; }

    .nb-wod-table td {
        height: var(--lh);
        padding-bottom: 4px;
        vertical-align: bottom;
        font-size: var(--fs);
        color: var(--text);
    }

    .nb-wod-table td.center {
        text-align: center;
        padding: 0 6px;
        width: 80px;
    }

    .nb-wod-input {
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.18);
        color: var(--text);
        font-family: 'Patrick Hand', cursive;
        font-size: var(--fs);
        width: 60px;
        padding: 0 4px 4px;
        outline: none;
        text-align: center;
        transition: border-color 0.12s;
    }

    body.light .nb-wod-input {
        border-bottom-color: rgba(0,0,0,0.18);
    }
    /* Muscle column on the left */
    .nb-wod-table td.nb-wod-muscle-cell {
        color: var(--red);
        font-size: 13px;
        padding-right: 24px;
        white-space: nowrap;
        width: 1%;
    }

    /* Exercise name column — shrink to content */
    .nb-wod-table td.nb-wod-exname-cell {
        white-space: nowrap;
        padding-right: 32px;
        width: 1%;
    }

    /* Weight input: muted by default, full text once user edits */
    .nb-wod-input.nb-weight { color: var(--muted); }
    .nb-wod-input.nb-weight.modified { color: var(--text); }

    .nb-wod-input:focus { border-bottom-color: var(--red-border); }
    .nb-wod-input:disabled { opacity: 0.4; cursor: not-allowed; }


    /* Check circle */
    .nb-wod-check {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1.5px solid var(--muted);
        background: transparent;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s;
        padding: 0;
        margin-bottom: 4px;
    }

    .nb-wod-check:hover {
        border-color: var(--text);
    }

    .nb-wod-check.checked {
        background: var(--text);
        border-color: var(--text);
        color: var(--bg);
        font-size: 12px;
        line-height: 1;
    }

    .nb-wod-check.checked::after {
        content: '✓';
    }

    /* Dimmed row state for checked exercises */
    .nb-wod-table tr.checked-row td {
        opacity: 0.4;
        transition: opacity 0.15s;
    }

    /* Keep the check circle itself fully opaque so it stays clickable & visible */
    .nb-wod-table tr.checked-row td:nth-child(6) {
        opacity: 1;
    }

    /* Persistent reddish prompt — holds clickable links, does NOT auto-hide */
    .nb-wod-prompt {
        display: none;
        color: rgba(192, 57, 43, 0.9);
        font-size: var(--fs);
        line-height: var(--lh);
        padding: 4px 0;
    }
    .nb-wod-prompt.visible { display: block; }
    .nb-wod-prompt a {
        color: rgba(192, 57, 43, 0.95);
        text-decoration: underline;
        text-decoration-color: var(--red-border);
        text-underline-offset: 3px;
        cursor: pointer;
    }
    .nb-wod-prompt a:hover { text-decoration-color: var(--red); }

    /* Red note shown with an auto-generated workout when a muscle group had no exercises */
    .nb-wod-gap-note {
        display: none;
        color: rgba(192, 57, 43, 0.9);
        font-size: 14px;
        line-height: var(--lh);
        padding-bottom: 4px;
    }
    .nb-wod-gap-note.visible { display: block; }
    .nb-wod-gap-note a {
        color: rgba(192, 57, 43, 0.95);
        text-decoration: underline;
        text-decoration-color: var(--red-border);
        text-underline-offset: 3px;
    }
</style>
{% endblock %}

{% block content %}

<div class="nb-section-label" style="color: var(--text);">Your WOD</div>

<!-- GENERATE SECTION -->
<div id="generate-section">
    <div class="nb-row" style="color: var(--muted);">Ready to train? Generate today's workout.</div>
    <div class="nb-spacer"></div>
    <div class="nb-row">
        <button id="generate-wod-btn" class="nb-btn">🏋️ Generate WOD</button>
    </div>
    <div class="nb-spacer"></div>
    <div id="wod-prompt" class="nb-wod-prompt"></div>
</div>

<!-- WORKOUT SECTION -->
<div id="workout-section" style="display:none;">

    <!-- Date + day info -->
    <div class="nb-row">
        <span style="color: var(--text);" id="workout-date-info"></span>
        <span style="color: var(--muted); margin-left: 12px; font-size: 14px;" id="routine-day-info"></span>
    </div>

    <div id="wod-gap-note" class="nb-wod-gap-note"></div>

    <div class="nb-spacer"></div>

    <!-- Exercise table -->
    <table class="nb-wod-table" id="workout-table">
        <thead>
            <tr>
                <th>Muscle</th>
                <th>Exercise</th>
                <th class="center">Weight (<span id="unit-label">kg</span>)</th>
                <th class="center">Sets</th>
                <th class="center">Reps</th>
                <th class="center" style="width: 36px;">✓</th>
            </tr>
        </thead>
        <tbody id="workout-table-body"></tbody>
    </table>

    <div class="nb-spacer"></div>

    <div class="nb-row">
        <button id="mark-complete-btn" class="nb-btn">✓ Mark as Complete</button>
        <button id="cancel-btn" class="nb-btn" style="margin-left: 12px;">✕ Cancel</button>
    </div>
</div>

<!-- SUCCESS SECTION -->
<div id="success-section" style="display:none;">
    <div class="nb-row" style="color: rgba(100,180,100,0.8);">🎉 Workout complete! Well done.</div>
    <div class="nb-spacer"></div>
    <div class="nb-row">
        <a href="/web/dashboard" class="nb-btn">← Back to Dashboard</a>
    </div>
</div>

<div id="message" class="nb-message" style="display:none;"></div>

{% endblock %}

{% block extra_js %}
<script>
    requireLogin();

    let currentWorkoutData = null;
    let isWorkoutCompleted = false;

    document.getElementById('generate-wod-btn').addEventListener('click', async () => {
        await generateWorkout();
    });

    document.getElementById('mark-complete-btn').addEventListener('click', async () => {
        if (!isWorkoutCompleted) await completeWorkout();
    });

    document.getElementById('cancel-btn').addEventListener('click', () => {
        document.getElementById('generate-section').style.display = 'block';
        document.getElementById('workout-section').style.display = 'none';
        hidePrompt();
        hideGapNote();
    });

    async function generateWorkout(afterAutoGenerate = false) {
        const userId = getCurrentUserId();
        const btn = document.getElementById('generate-wod-btn');
        btn.textContent = 'Loading...';
        btn.disabled = true;
        hidePrompt();
        hideGapNote();

        try {
            // Must have a real routine first
            const routine = await requireRoutine();
            if (!routine) {
                showPrompt(`You need to <a href="/web/routine">create your routine</a> before generating a workout.`);
                resetGenerateBtn();
                return;
            }

            const stateRes = await fetch(`${API_URL}/workout/state/${userId}`, { headers: authHeaders() });
            const state = await stateRes.json();
            const currentDay = state.current_day_number;
            const muscleGroupsForCurrentDay = routine.routine_days[currentDay] || [];

            const selectionsRes = await fetch(`${API_URL}/next-workout/selections/${userId}`, { headers: authHeaders() });
            const selections = await selectionsRes.json();
            const selectedExercises = selections.filter(s => s.is_selected);

            const allExercises = await getUserExercises();
            const workoutExercises = selectedExercises
                .map(sel => allExercises.find(ex => ex.exercise_id === sel.exercise_id))
                .filter(ex => ex !== undefined);

            const filteredWorkoutExercises = workoutExercises.filter(ex =>
                muscleGroupsForCurrentDay.includes(ex.exercise_muscle_group)
            );

            // Nothing usable for today (no selections at all, or none matching today's muscles)
            if (filteredWorkoutExercises.length === 0) {
                if (afterAutoGenerate) {
                    // Auto-generate ran but produced nothing for today's muscle groups
                    showPrompt(`No exercises in your library for today's muscle groups (${muscleGroupsForCurrentDay.join(', ')}). <a href="/web/exercises">Add some on the Exercises page</a>.`);
                } else {
                    showPrompt(`No exercises selected for the current day. Please select them in the <a href="/web/calendar">Calendar</a> or do an <a id="wod-autogen-link">automatic selection</a>.`);
                    const link = document.getElementById('wod-autogen-link');
                    if (link) link.addEventListener('click', () => autoGenerateSelection(currentDay, muscleGroupsForCurrentDay));
                }
                resetGenerateBtn();
                return;
            }

            currentWorkoutData = {
                day_number: currentDay,
                muscle_groups: muscleGroupsForCurrentDay,
                exercises: filteredWorkoutExercises
            };

            displayWorkout(currentWorkoutData);

            // Red note for empty muscle groups ONLY when this came from auto-generation.
            // Manual selections are deliberate — we respect them and show no note.
            if (afterAutoGenerate) {
                const coveredGroups = new Set(filteredWorkoutExercises.map(ex => ex.exercise_muscle_group));
                const emptyGroups = muscleGroupsForCurrentDay.filter(mg => !coveredGroups.has(mg));
                if (emptyGroups.length > 0) {
                    showGapNote(`No exercises found for: ${emptyGroups.join(', ')}. <a href="/web/exercises">Add some on the Exercises page</a> to include them.`);
                }
            }

            document.getElementById('generate-section').style.display = 'none';
            document.getElementById('workout-section').style.display = 'block';
            resetGenerateBtn();

        } catch (error) {
            console.error('Error generating workout:', error);
            showMessage('Error generating workout. Please try again.', 'error');
            resetGenerateBtn();
        }
    }

    async function autoGenerateSelection(currentDay, muscleGroupsForCurrentDay) {
        const userId = getCurrentUserId();
        hidePrompt();
        try {
            const res = await fetch(`${API_URL}/next-workout/generate/${userId}?day_number=${currentDay}`, {
                method: 'POST',
                headers: authHeaders()
            });
            if (!res.ok) {
                showMessage('Could not auto-generate a selection. Please try again.', 'error');
                return;
            }
            const result = await res.json();
            if (result.exercises_selected > 0) {
                // Re-run generation; afterAutoGenerate=true enables the empty-group note
                await generateWorkout(true);
            } else {
                showPrompt(`No exercises in your library for today's muscle groups (${muscleGroupsForCurrentDay.join(', ')}). <a href="/web/exercises">Add some on the Exercises page</a>.`);
            }
        } catch (err) {
            console.error('Auto-generate error:', err);
            showMessage('Could not auto-generate a selection. Please try again.', 'error');
        }
    }

    function resetGenerateBtn() {
        const btn = document.getElementById('generate-wod-btn');
        btn.textContent = '🏋️ Generate WOD';
        btn.disabled = false;
    }

    function showPrompt(html) {
        const el = document.getElementById('wod-prompt');
        el.innerHTML = html;
        el.classList.add('visible');
    }
    function hidePrompt() {
        const el = document.getElementById('wod-prompt');
        el.classList.remove('visible');
        el.innerHTML = '';
    }
    function showGapNote(html) {
        const el = document.getElementById('wod-gap-note');
        el.innerHTML = html;
        el.classList.add('visible');
    }
    function hideGapNote() {
        const el = document.getElementById('wod-gap-note');
        el.classList.remove('visible');
        el.innerHTML = '';
    }

    function displayWorkout(workoutData) {
        const today = new Date();
        document.getElementById('workout-date-info').textContent = formatDateShort(today);
        document.getElementById('routine-day-info').textContent = `Day ${workoutData.day_number} — ${workoutData.muscle_groups.join(', ')}`;

        getUserProfile().then(profile => {
            if (profile && profile.user_unit_preference === 'imperial') {
                document.getElementById('unit-label').textContent = 'lbs';
            }
        });

        const tbody = document.getElementById('workout-table-body');
        tbody.innerHTML = '';

        const exercisesByMuscle = {};
        workoutData.exercises.forEach(ex => {
            if (!exercisesByMuscle[ex.exercise_muscle_group]) exercisesByMuscle[ex.exercise_muscle_group] = [];
            exercisesByMuscle[ex.exercise_muscle_group].push(ex);
        });

        let exerciseIndex = 0;
        Object.keys(exercisesByMuscle).sort().forEach(muscleGroup => {
            exercisesByMuscle[muscleGroup].forEach((exercise, idxWithinGroup) => {
                const row = document.createElement('tr');
                row.dataset.exerciseId = exercise.exercise_id;

                // Muscle
                const muscleCell = document.createElement('td');
                muscleCell.className = 'nb-wod-muscle-cell';
                muscleCell.textContent = muscleGroup;
                row.appendChild(muscleCell);

                // Exercise name
                const nameCell = document.createElement('td');
                nameCell.className = 'nb-wod-exname-cell';
                nameCell.textContent = exercise.exercise_name;
                row.appendChild(nameCell);

                // Weight
                const weightCell = document.createElement('td');
                weightCell.className = 'center';
                const weightInput = document.createElement('input');
                weightInput.type = 'number';
                weightInput.id = `weight-${exerciseIndex}`;
                weightInput.className = 'nb-wod-input nb-weight';
                weightInput.value = exercise.exercise_user_current_weight || '';
                weightInput.placeholder = '';
                weightInput.step = '0.5';
                weightInput.min = '0';
                weightInput.addEventListener('input', () => {
                    weightInput.classList.add('modified');
                });
                weightCell.appendChild(weightInput);
                row.appendChild(weightCell);

                // Sets
                const setsCell = document.createElement('td');
                setsCell.className = 'center';
                const setsInput = document.createElement('input');
                setsInput.type = 'number';
                setsInput.id = `sets-${exerciseIndex}`;
                setsInput.className = 'nb-wod-input';
                setsInput.placeholder = '';
                setsInput.min = '1';
                setsInput.max = '10';
                setsCell.appendChild(setsInput);
                row.appendChild(setsCell);

                // Reps
                const repsCell = document.createElement('td');
                repsCell.className = 'center';
                const repsInput = document.createElement('input');
                repsInput.type = 'number';
                repsInput.id = `reps-${exerciseIndex}`;
                repsInput.className = 'nb-wod-input';
                repsInput.placeholder = '';
                repsInput.min = '1';
                repsInput.max = '50';
                repsCell.appendChild(repsInput);
                row.appendChild(repsCell);

                // Check cell — toggles row "done" state
                const checkCell = document.createElement('td');
                checkCell.className = 'center';
                const checkBtn = document.createElement('button');
                checkBtn.className = 'nb-wod-check';
                checkBtn.type = 'button';
                checkBtn.setAttribute('aria-label', 'Mark exercise complete');
                checkBtn.addEventListener('click', () => {
                    const isChecked = checkBtn.classList.toggle('checked');
                    row.classList.toggle('checked-row', isChecked);
                });
                checkCell.appendChild(checkBtn);
                row.appendChild(checkCell);

                tbody.appendChild(row);
                exerciseIndex++;
            });
        });
    }

    async function completeWorkout() {
        // Find which exercises were checked off
        const checkedRows = document.querySelectorAll('#workout-table-body tr.checked-row');
        const checkedExerciseIds = new Set(
            Array.from(checkedRows).map(row => parseInt(row.dataset.exerciseId))
        );

        if (checkedExerciseIds.size === 0) {
            showMessage('No exercises checked off. Tick the ones you completed.', 'error');
            return;
        }

        // Validate: every CHECKED exercise must have a sets value
        const missingSets = [];
        currentWorkoutData.exercises.forEach((ex, index) => {
            if (!checkedExerciseIds.has(ex.exercise_id)) return;  // skip unchecked
            const setsVal = document.getElementById(`sets-${index}`).value;
            if (!setsVal || parseInt(setsVal) <= 0) {
                missingSets.push(ex.exercise_name);
            }
        });

        if (missingSets.length > 0) {
            showMessage(`Please enter sets for: ${missingSets.join(', ')}`, 'error');
            return;
        }

        // Build payload — only checked exercises
        const exercises = currentWorkoutData.exercises
            .map((exercise, index) => ({ exercise, index }))
            .filter(({ exercise }) => checkedExerciseIds.has(exercise.exercise_id))
            .map(({ exercise, index }) => ({
                exercise_id: exercise.exercise_id,
                sets_completed: parseInt(document.getElementById(`sets-${index}`).value) || 0,
                reps_completed: parseInt(document.getElementById(`reps-${index}`).value) || 0,
                weight_used: parseFloat(document.getElementById(`weight-${index}`).value) || 0
            }));

        const userId = getCurrentUserId();
        const btn = document.getElementById('mark-complete-btn');
        btn.textContent = '💾 Saving...';
        btn.disabled = true;

        try {
            const response = await fetch(`${API_URL}/workout/complete/${userId}`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({
                    day_number: currentWorkoutData.day_number,
                    exercises: exercises
                })
            });

            if (response.ok) {
                isWorkoutCompleted = true;
                btn.textContent = '✅ Complete!';
                btn.classList.add('nb-btn-saved');

                currentWorkoutData.exercises.forEach((ex, index) => {
                    ['weight', 'sets', 'reps'].forEach(field => {
                        const el = document.getElementById(`${field}-${index}`);
                        if (el) el.disabled = true;
                    });
                });

                setTimeout(() => {
                    document.getElementById('workout-section').style.display = 'none';
                    document.getElementById('success-section').style.display = 'block';
                }, 1500);

            } else {
                showMessage('Error saving workout. Please try again.', 'error');
                btn.textContent = '✓ Mark as Complete';
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('Network error. Please try again.', 'error');
            btn.textContent = '✓ Mark as Complete';
            btn.disabled = false;
        }
    }

    function showMessage(text, type) {
        const message = document.getElementById('message');
        message.textContent = text;
        message.className = type === 'success' ? 'nb-message success' : 'nb-message error';
        message.style.display = 'flex';
        setTimeout(() => { message.style.display = 'none'; }, 3000);
    }

    function formatDateShort(date) {
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}`;
    }
</script>
{% endblock %}
