<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal — Password Reset</title>
    <link rel="stylesheet" href="/static/css/notebook.css">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/favicon/apple-touch-icon.png">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            background-image: none;
        }

        .nb-auth-page {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 80px 24px 24px;
            background: var(--bg);
        }

        .nb-auth-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% var(--lh);
            background-position: 0 0;
            padding: var(--lh) 36px var(--lh) 56px;
        }

        .nb-auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 26px;
            width: 2px;
            background: var(--margin);
        }

        .nb-auth-logo-row {
            height: calc(var(--lh) * 2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
        }

        .nb-auth-logo {
            height: calc(var(--lh) * 1.75);
            width: auto;
            opacity: 0.9;
        }

        .nb-auth-tagline {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
            color: var(--text);
            font-size: var(--fs);
        }

        /* Message text — flows across multiple ruled lines */
        .nb-auth-message-text {
            color: var(--text);
            font-size: var(--fs);
            line-height: var(--lh);
            padding: var(--lh) 0;
        }

        .nb-auth-message-text a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--red-border);
            text-underline-offset: 3px;
        }

        .nb-auth-message-text a:hover {
            text-decoration-color: var(--red);
        }

        .nb-auth-btn-row {
            height: calc(var(--lh) * 2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
        }

        .nb-auth-btn {
            width: 62%;
            background: transparent;
            border: 2px solid var(--red-border);
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            height: calc(var(--lh) - 4px);
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.12s;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .nb-auth-btn:hover {
            border-color: rgba(150, 30, 30, 0.8);
            background: var(--active-bg);
        }

        .nb-auth-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="nb-auth-page">
    <div class="nb-auth-card">
        <div class="nb-auth-logo-row">
            <img src="/static/images/logo-drawn-both-v4.3.png" alt="FitJournal" class="nb-auth-logo">
        </div>
        <div class="nb-auth-tagline">Password reset</div>

        <div class="nb-auth-message-text">
            Self-service password reset isn't available yet. To reset your password, please email
            <a href="mailto:info@fit-journal.com">info@fit-journal.com</a>
            and we'll help you out.
        </div>

        <div class="nb-auth-btn-row">
            <a href="/web/login" class="nb-auth-btn">Back to Sign In</a>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }
</script>

</body>
</html>
