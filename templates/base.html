<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal - {{ page_title }}</title>
    <link rel="stylesheet" href="/static/css/notebook.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

<div id="nb-app">

    <!-- HEADER -->
    <header id="nb-header">
        <div style="width: var(--sw); flex-shrink: 0;"></div>
        <div class="nb-logo">
            <img src="/static/images/logo_only.png" alt="FitJournal">
            <div class="nb-logo-text">FitJournal</div>
        </div>
        <div class="nb-user">
            <span class="nb-user-name" id="user-name"></span>
            <button class="nb-logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- BODY -->
    <div id="nb-body">

        <!-- SIDEBAR -->
        {% include 'partials/sidebar.html' %}

        <!-- MAIN CONTENT -->
        <main id="nb-main">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    // Restore light/dark mode preference
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }

    // Mode toggle
    const toggle = document.getElementById('nb-mode-toggle');
    toggle.addEventListener('click', () => {
        document.body.classList.toggle('light');
        localStorage.setItem('nb-mode',
            document.body.classList.contains('light') ? 'light' : 'dark'
        );
    });

    // Load user name
    document.addEventListener('DOMContentLoaded', async () => {
        let userName = getCurrentUserFirstName();
        if (!userName) {
            const profile = await getUserProfile();
            if (profile && profile.user_first_name) {
                userName = profile.user_first_name;
                localStorage.setItem('user_first_name', userName);
            } else {
                userName = getCurrentUserEmail();
            }
        }
        if (userName) document.getElementById('user-name').textContent = userName;
    });
</script>
{% block extra_js %}{% endblock %}

</body>
</html>
