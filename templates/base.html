<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal - {{ page_title }}</title>
    <link rel="stylesheet" href="/static/css/notebook.css">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/favicon/apple-touch-icon.png">
    {% block extra_css %}{% endblock %}
</head>
<body>

<div id="nb-app">

    <!-- HEADER -->
    <header id="nb-header">
        <div style="width: var(--sw); flex-shrink: 0;"></div>
        <div class="nb-logo">
            <img src="/static/images/logo-drawn-both-v4.3.pnG" class="logo-dark-mode" alt="FitJournal">
            <img src="/static/images/logo-drawn-both-v4.3-dark.png" class="logo-light-mode" alt="FitJournal">
        </div>
        <div class="nb-user">
            <span class="nb-user-name" id="user-name"></span>
            <button class="nb-logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- BODY -->
    <div id="nb-body">

        <!-- SIDEBAR -->
        {% include 'partials/sidebar.html' %}

        <!-- MAIN CONTENT -->
        <main id="nb-main">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    // Restore light/dark mode preference
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }

    // Mode toggle
    const toggles = document.querySelectorAll('.nb-hole');
    toggles.forEach(toggle => {
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            localStorage.setItem('nb-mode',
                document.body.classList.contains('light') ? 'light' : 'dark'
            );
        });
    });

    // Load user name
    document.addEventListener('DOMContentLoaded', async () => {
        let userName = getCurrentUserFirstName();
        if (!userName) {
            const profile = await getUserProfile();
            if (profile && profile.user_first_name) {
                userName = profile.user_first_name;
                localStorage.setItem('user_first_name', userName);
            } else {
                userName = getCurrentUserEmail();
            }
        }
        if (userName) document.getElementById('user-name').textContent = userName;
    });
</script>
{% block extra_js %}{% endblock %}

</body>
</html>
