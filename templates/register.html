<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal — Register</title>
    <link rel="stylesheet" href="/static/css/notebook.css">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/favicon/apple-touch-icon.png">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            background-image: none;
        }

        .nb-auth-page {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 80px 24px 24px;
            background: var(--bg);
        }

        .nb-auth-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% var(--lh);
            background-position: 0 0;
            padding: var(--lh) 36px var(--lh) 56px;
        }

        .nb-auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 26px;
            width: 2px;
            background: var(--margin);
        }

        .nb-auth-logo-row {
            height: calc(var(--lh) * 2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
        }

        .nb-auth-logo {
            height: calc(var(--lh) * 1.75);
            width: auto;
            opacity: 0.9;
        }

        .nb-auth-tagline {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
            color: var(--text);
            font-size: var(--fs);
        }

        .nb-auth-label {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            padding-bottom: 2px;
            font-size: var(--fs);
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .nb-auth-field {
            position: relative;
        }

        .nb-auth-eye {
            position: absolute;
            right: 2px;
            bottom: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--muted);
            padding: 0 4px;
            line-height: 0;
            opacity: 0.65;
            transition: opacity 0.12s;
        }
        .nb-auth-eye:hover { opacity: 1; }

        .nb-auth-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            height: var(--lh);
            width: 100%;
            padding: 0 2px 4px;
            outline: none;
            display: block;
        }

        .nb-auth-input::placeholder {
            color: var(--muted);
        }

        .nb-auth-field::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 1.5px;
            background: var(--red-border);
            opacity: 0;
            transition: opacity 0.12s;
        }

        .nb-auth-field:focus-within::after {
            opacity: 1;
        }

        .nb-auth-message {
            height: var(--lh);
            display: none;
            align-items: flex-end;
            padding-bottom: 2px;
            font-size: 14px;
        }

        .nb-auth-message.visible {
            display: flex;
        }

        .nb-auth-message.error   { color: rgba(192, 57, 43, 0.85); }
        .nb-auth-message.success { color: rgba(100, 180, 100, 0.85); }

        .nb-auth-btn-row {
            height: calc(var(--lh) * 2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
        }

        .nb-auth-btn {
            width: 62%;
            background: transparent;
            border: 2px solid var(--red-border);
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            height: calc(var(--lh) - 4px);
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.12s;
            letter-spacing: 0.5px;
        }

        .nb-auth-btn:hover {
            border-color: rgba(150, 30, 30, 0.8);
            background: var(--active-bg);
        }

        .nb-auth-btn:active {
            transform: scale(0.98);
        }

        .nb-auth-link {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
            font-size: 14px;
            color: var(--muted);
        }

        .nb-auth-link a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--red-border);
            text-underline-offset: 3px;
            margin-left: 5px;
        }

        .nb-auth-link a:hover {
            text-decoration-color: var(--red);
        }
    </style>
</head>
<body>

<div class="nb-auth-page">
    <div class="nb-auth-card">
        <div class="nb-auth-logo-row">
            <img src="/static/images/logo-drawn-both-v4.3-transparent.png" alt="FitJournal" class="nb-auth-logo">
        </div>
        <div class="nb-auth-tagline">Start your fitness journey</div>

        <div class="nb-auth-label">Email</div>
        <div class="nb-auth-field">
            <input type="email" id="email" class="nb-auth-input" placeholder="you@example.com" autocomplete="email" autofocus>
        </div>

        <div class="nb-auth-label">Password</div>
        <div class="nb-auth-field">
            <input type="password" id="password" class="nb-auth-input" placeholder="••••••••" autocomplete="new-password" style="padding-right: 34px;">
            <button type="button" class="nb-auth-eye" data-target="password" aria-label="Show password">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path class="eye-open" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                    <circle class="eye-open" cx="12" cy="12" r="3"/>
                    <path class="eye-closed" d="M3 3l18 18" style="display:none;"/>
                </svg>
            </button>
        </div>

        <div class="nb-auth-label">Repeat Password</div>
        <div class="nb-auth-field">
            <input type="password" id="confirm-password" class="nb-auth-input" placeholder="••••••••" autocomplete="new-password" style="padding-right: 34px;">
            <button type="button" class="nb-auth-eye" data-target="confirm-password" aria-label="Show password">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path class="eye-open" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                    <circle class="eye-open" cx="12" cy="12" r="3"/>
                    <path class="eye-closed" d="M3 3l18 18" style="display:none;"/>
                </svg>
            </button>
        </div>

        <div id="message" class="nb-auth-message"></div>

        <div class="nb-auth-btn-row">
            <button id="register-btn" class="nb-auth-btn">Create Account</button>
        </div>

        <div class="nb-auth-link">
            Already have an account? <a href="/web/login">Sign in here</a>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }

    const messageEl = document.getElementById('message');

    function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = `nb-auth-message visible ${type}`;
    }

    async function attemptRegister() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm-password').value;

        if (!email || !password || !confirm) {
            showMessage('Please fill in all fields.', 'error');
            return;
        }

        if (password !== confirm) {
            showMessage('Passwords do not match.', 'error');
            return;
        }

        if (password.length < 8) {
            showMessage('Password must be at least 8 characters.', 'error');
            return;
        }

        const result = await registerUser(email, password);
        if (result && result.success) {
            showMessage('Account created. Redirecting to login...', 'success');
            setTimeout(() => { window.location.href = '/web/login'; }, 1200);
        } else {
            const err = (result && result.error) || 'Registration failed. The email may already be in use.';
            showMessage(err, 'error');
        }
    }

    document.getElementById('register-btn').addEventListener('click', attemptRegister);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') attemptRegister();
    });

    // Password visibility toggle(s)
    document.querySelectorAll('.nb-auth-eye').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = document.getElementById(btn.dataset.target);
            const showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            // eye outline always visible; only the slash toggles
            btn.querySelector('.eye-closed').style.display = showing ? 'none' : '';
            btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        });
    });
</script>

</body>
</html>
