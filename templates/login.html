<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal — Login</title>
    <link rel="stylesheet" href="/static/css/notebook.css">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            background-image: none;
        }

        .nb-auth-page {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 80px 24px 24px;
            background: var(--bg);
        }

        /* Contained notebook card — ruled lines across the whole card, on the --lh grid */
        .nb-auth-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% var(--lh);
            background-position: 0 0;
            padding: var(--lh) 36px var(--lh);
        }

        /* Red margin line down the left, inside the card */
        .nb-auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 26px;
            width: 2px;
            background: var(--margin);
        }

        /* Logo spans two ruled rows, rests on the lower line */
        .nb-auth-logo-row {
            height: calc(var(--lh) * 2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
        }

        .nb-auth-logo {
            height: calc(var(--lh) * 1.75);
            width: auto;
            opacity: 0.9;
        }

        /* Every text row is one --lh tall; text rests on its line via flex-end + 4px gap */
        .nb-auth-tagline {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
            color: var(--text);
            font-size: var(--fs);
        }

        .nb-auth-label {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            padding-bottom: 2px;
            font-size: var(--fs);
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .nb-auth-field {
            position: relative;
        }

        .nb-auth-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            height: var(--lh);
            width: 100%;
            padding: 0 2px 4px;
            outline: none;
            display: block;
        }

        .nb-auth-input::placeholder {
            color: var(--muted);
        }

        /* Focus: the ruled line under the active field turns red */
        .nb-auth-field::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 1.5px;
            background: var(--red-border);
            opacity: 0;
            transition: opacity 0.12s;
        }

        .nb-auth-field:focus-within::after {
            opacity: 1;
        }

        .nb-auth-error {
            height: var(--lh);
            display: none;
            align-items: flex-end;
            padding-bottom: 2px;
            color: rgba(192,57,43,0.85);
            font-size: 14px;
        }

        .nb-auth-error.visible {
            display: flex;
        }

        /* Button spans two rows, sits on the lower line */
        .nb-auth-btn-row {
            height: calc(var(--lh) * 2);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
        }

        .nb-auth-btn {
            width: 62%;
            background: transparent;
            border: 2px solid var(--red-border);
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            height: calc(var(--lh) - 4px);
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.12s;
            letter-spacing: 0.5px;
        }

        .nb-auth-btn:hover {
            border-color: rgba(150, 30, 30, 0.8);
            background: var(--active-bg);
        }

        .nb-auth-btn:active {
            transform: scale(0.98);
        }

        .nb-auth-link {
            height: var(--lh);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 2px;
            font-size: 14px;
            color: var(--muted);
        }

        .nb-auth-link a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--red-border);
            text-underline-offset: 3px;
            margin-left: 5px;
        }

        .nb-auth-link a:hover {
            text-decoration-color: var(--red);
        }
    </style>
</head>
<body>

<div class="nb-auth-page">
    <div class="nb-auth-card">
        <div class="nb-auth-logo-row">
            <img src="/static/images/logo-drawn-both-v4.3.png" alt="FitJournal" class="nb-auth-logo">
        </div>
        <div class="nb-auth-tagline">Sign in and log your next session</div>

        <div class="nb-auth-label">Email</div>
        <div class="nb-auth-field">
            <input type="email" id="email" class="nb-auth-input" placeholder="you@example.com" autocomplete="email" autofocus>
        </div>

        <div class="nb-auth-label">Password</div>
        <div class="nb-auth-field">
            <input type="password" id="password" class="nb-auth-input" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div id="error-msg" class="nb-auth-error"></div>

        <div class="nb-auth-btn-row">
            <button id="login-btn" class="nb-auth-btn">Sign In</button>
        </div>

        <div class="nb-auth-link">
            Don't have an account? <a href="/web/register">Register here</a>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }

    // If already logged in, skip straight to dashboard
    if (isLoggedIn()) {
        window.location.href = '/web/dashboard';
    }

    const errorMsg = document.getElementById('error-msg');

    async function attemptLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorMsg.classList.remove('visible');

        if (!email || !password) {
            errorMsg.textContent = 'Please enter your email and password.';
            errorMsg.classList.add('visible');
            return;
        }

        const result = await loginUser(email, password);
        if (result.success) {
            window.location.href = '/web/dashboard';
        } else {
            errorMsg.textContent = result.error;
            errorMsg.classList.add('visible');
        }
    }

    document.getElementById('login-btn').addEventListener('click', attemptLogin);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') attemptLogin();
    });
</script>

</body>
</html>
