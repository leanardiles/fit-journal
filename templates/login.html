<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal — Login</title>
    <link rel="stylesheet" href="/static/css/notebook.css">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            background-image: none;
        }

        .nb-auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg);
        }

        .nb-auth-card {
            width: 100%;
            max-width: 380px;
            background: transparent;
            border: 1px solid var(--border);
            border-top: 2px solid var(--red-border);
            border-radius: 10px;
            padding: 32px 32px 28px;
        }

        .nb-auth-logo {
            display: block;
            margin: 0 auto 24px;
            width: 96px;
            height: auto;
            opacity: 0.95;
        }

        .nb-auth-field {
            margin-bottom: 18px;
        }

        .nb-auth-label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nb-auth-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            width: 100%;
            padding: 4px 0;
            outline: none;
            transition: border-color 0.12s;
        }

        body.light .nb-auth-input {
            border-bottom-color: rgba(0,0,0,0.18);
        }

        .nb-auth-input:focus {
            border-bottom-color: var(--red-border);
        }

        .nb-auth-error {
            display: none;
            color: rgba(192,57,43,0.85);
            font-size: 14px;
            margin: 8px 0 4px;
            min-height: var(--lh);
        }

        .nb-auth-error.visible {
            display: block;
        }

        .nb-auth-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--red-border);
            color: var(--text);
            font-family: 'Patrick Hand', cursive;
            font-size: var(--fs);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.12s;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .nb-auth-btn:hover {
            border-color: rgba(150, 30, 30, 0.7);
            background: var(--active-bg);
        }

        .nb-auth-btn:active {
            transform: scale(0.98);
        }

        .nb-auth-link {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: var(--muted);
        }

        .nb-auth-link a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--red-border);
            text-underline-offset: 3px;
        }

        .nb-auth-link a:hover {
            text-decoration-color: var(--red);
        }
    </style>
</head>
<body>

<div class="nb-auth-page">
    <div class="nb-auth-card">
        <img src="/static/images/logo_only.png" alt="FitJournal" class="nb-auth-logo">

        <div class="nb-auth-field">
            <label class="nb-auth-label" for="email">Email</label>
            <input type="email" id="email" class="nb-auth-input" autocomplete="email" autofocus>
        </div>

        <div class="nb-auth-field">
            <label class="nb-auth-label" for="password">Password</label>
            <input type="password" id="password" class="nb-auth-input" autocomplete="current-password">
        </div>

        <div id="error-msg" class="nb-auth-error"></div>

        <button id="login-btn" class="nb-auth-btn">Sign In</button>

        <div class="nb-auth-link">
            Don't have an account? <a href="/web/register">Register here</a>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
    // Respect saved theme preference
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }

    const errorMsg = document.getElementById('error-msg');

    async function attemptLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorMsg.classList.remove('visible');

        if (!email || !password) {
            errorMsg.textContent = 'Please enter your email and password.';
            errorMsg.classList.add('visible');
            return;
        }

        const result = await loginUser(email, password);
        if (result.success) {
            window.location.href = '/web/dashboard';
        } else {
            errorMsg.textContent = result.error;
            errorMsg.classList.add('visible');
        }
    }

    document.getElementById('login-btn').addEventListener('click', attemptLogin);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') attemptLogin();
    });
</script>

</body>
</html>
