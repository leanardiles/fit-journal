<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal - Registration</title>
    <link rel="stylesheet" href="css/paper.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Container to center everything -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
        
        <!-- 1. Logo first -->
        <div style="margin-bottom: 0.5rem;">
            <img src="images/logo_only.png" alt="FitJournal logo" style="max-width: 300px; width: 90%; border: none; box-shadow: none; background: transparent;">
        </div>
        
        <!-- 2. Welcome text -->
        <h2 style="margin-bottom: 0.5rem; margin-top: 0;">Start your fitness journey</h2>
        
        <!-- 3. Registration form -->
        <div style="width: 100%; max-width: 400px;">
            <h3>Sign Up to FitJournal</h3>
            
            <form id="registration-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" class="input-block" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Your password" class="input-block" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Repeat Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat your password" class="input-block" required>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Create Account</button>
            </form>
            
            <p class="margin-top" style="text-align: center;">
                Already have an account? <a href="login.html">Log in here</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
