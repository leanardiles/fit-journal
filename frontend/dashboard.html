<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal - Dashboard</title>
    <link rel="stylesheet" href="css/notebook.css">
</head>
<body>

<div id="nb-app">

    <!-- HEADER — blank top area, logo left, user right -->
    <header id="nb-header">
        <div style="width: var(--sw); flex-shrink: 0;"></div>
        <div class="nb-logo">
            <img src="images/logo_only.png" alt="FitJournal">
            <div class="nb-logo-text">FitJournal</div>
        </div>
        <div class="nb-user">
            <span class="nb-user-name" id="user-name"></span>
            <button class="nb-logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- BODY — ruled lines start here -->
    <div id="nb-body">

        <!-- SIDEBAR -->
        <aside id="nb-sidebar">
            <nav>
                <a href="dashboard.html" class="nb-active"><span class="nb-dot"></span> Dashboard</a>
                <a href="profile.html"><span class="nb-dot"></span> Profile</a>
                <a href="routine.html"><span class="nb-dot"></span> Routine</a>
                <a href="exercises.html"><span class="nb-dot"></span> Exercises</a>
                <a href="calendar.html"><span class="nb-dot"></span> Calendar</a>
                <a href="getwod.html"><span class="nb-dot"></span> Get WOD</a>
            </nav>
            <button id="nb-mode-toggle" title="Toggle light/dark mode"></button>
        </aside>

        <!-- MAIN -->
        <main id="nb-main">

            <div class="nb-page-title">Dashboard</div>

            <div class="nb-section-label">quick stats</div>
            <div class="nb-stat-row">
                <div class="nb-stat-item">
                    This week: <span class="nb-val" id="workouts-this-week">—</span>
                </div>
                <div class="nb-stat-item">
                    Current day: <span class="nb-val" id="current-day">—</span>
                </div>
            </div>

            <div class="nb-spacer"></div>

            <div class="nb-section-label">your routine</div>
            <div id="routine-container">
                <div class="nb-row">
                    <span style="color: var(--muted);">Loading...</span>
                </div>
            </div>

            <div id="message" class="nb-message" style="display:none;"></div>

        </main>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    // Restore light/dark mode preference
    if (localStorage.getItem('nb-mode') === 'light') {
        document.body.classList.add('light');
    }
    
    requireLogin();

    document.addEventListener('DOMContentLoaded', async () => {
        let userName = getCurrentUserFirstName();
        if (!userName) {
            const profile = await getUserProfile();
            if (profile && profile.user_first_name) {
                userName = profile.user_first_name;
                localStorage.setItem('user_first_name', userName);
            } else {
                userName = getCurrentUserEmail();
            }
        }
        if (userName) document.getElementById('user-name').textContent = userName;

        await Promise.all([loadRoutine(), loadStats()]);
    });

    async function loadStats() {
        try {
            const userId = getCurrentUserId();
            const res = await fetch(`${API_URL}/workout/state/${userId}`, { headers: authHeaders() });
            const stateData = await res.json();
            document.getElementById('current-day').textContent = `Day ${stateData.current_day_number}`;

            const sessions = await getWorkoutSessions(userId, 20);
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(now.setDate(diff));
            monday.setHours(0,0,0,0);
            const thisWeek = sessions.filter(s => new Date(s.workout_date) >= monday).length;
            document.getElementById('workouts-this-week').textContent = thisWeek;
        } catch(e) {
            document.getElementById('current-day').textContent = '—';
        }
    }

    async function loadRoutine() {
        const container = document.getElementById('routine-container');
        const routine = await getUserRoutine();

        if (!routine || routine.days_per_week === 0) {
            container.innerHTML = `
                <div class="nb-row">
                    <span style="color: var(--muted);">No routine set up yet.</span>
                    <a href="routine.html" class="nb-btn" style="margin-left:16px;">Create Routine</a>
                </div>`;
            return;
        }

        let currentDay = 1;
        try {
            const userId = getCurrentUserId();
            const res = await fetch(`${API_URL}/workout/state/${userId}`, { headers: authHeaders() });
            const data = await res.json();
            currentDay = data.current_day_number;
        } catch(e) {}

        let html = `<div class="nb-row" style="color:var(--muted);font-size:14px;">
            Training ${routine.days_per_week} ${routine.days_per_week === 1 ? 'day' : 'days'} per week
        </div>`;

        for (let day = 1; day <= routine.days_per_week; day++) {
            const muscles = routine.routine_days[day] || [];
            const isToday = day === currentDay;
            html += `
                <div class="nb-day-row">
                    <span class="nb-day-label ${isToday ? 'nb-today' : 'nb-other'}">Day ${day} —</span>
                    <span class="nb-day-muscles ${isToday ? 'nb-today' : ''}">
                        ${muscles.length > 0 ? muscles.join(', ') : 'Rest day'}
                    </span>
                    ${isToday ? '<span class="nb-today-tag">← today</span>' : ''}
                </div>`;
        }

        html += `
            <div class="nb-spacer"></div>
            <div class="nb-row">
                <a href="routine.html" class="nb-btn">✎ Edit Routine</a>
            </div>`;

        container.innerHTML = html;
    }
</script>
<script>
  const toggle = document.getElementById('nb-mode-toggle');
  // Restore saved preference
  if (localStorage.getItem('nb-mode') === 'light') {
    document.body.classList.add('light');
  }
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('light');
    localStorage.setItem('nb-mode',
      document.body.classList.contains('light') ? 'light' : 'dark'
    );
  });
</script>

</body>
</html>
