<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitJournal - Profile</title>
    <link rel="stylesheet" href="css/paper.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="text-center">
        <div class="margin-top">
            <img src="images/logo_only.png" alt="FitJournal Logo" style="max-width: 80px;">
        </div>
        
        <nav class="margin-top">
            <button onclick="window.location.href='dashboard.html'">Dashboard</button>
            <button onclick="window.location.href='profile.html'">Profile</button>
            <button onclick="window.location.href='exercises.html'">Exercises</button>
            <button onclick="window.location.href='routine.html'">Routine</button>
            <button onclick="window.location.href='calendar.html'">Calendar</button>
            <button onclick="window.location.href='getwod.html'">Get WOD</button>
        </nav>
        
        <!-- User Info & Logout -->
        <div style="position: absolute; top: 1rem; right: 2rem; display: flex; align-items: center; gap: 1rem;">
            <span id="user-email" style="color: #ffffff; font-size: 0.9rem;"></span>
            <button onclick="logout()" style="padding: 0.4rem 1rem; font-size: 0.85rem;">
                Logout
            </button>
        </div>
    </header>

    <!-- Profile Content -->
    <main class="container margin-top">
        <h3 class="text-center">Your Profile</h3>
        
        <form id="profile-form">
            <!-- Email (read-only) -->
            <div class="form-group">
                <label for="email">User (Email)</label>
                <input type="email" id="email" class="input-block" readonly style="background-color: #2a2a2a; cursor: not-allowed;">
            </div>
            
            <!-- Name -->
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" class="input-block" placeholder="Your name">
            </div>
            
            <!-- Sex -->
            <div class="form-group">
                <label>Sex</label>
                <div id="sex-buttons" style="display: flex; gap: 1rem;">
                    <button type="button" class="sex-btn" data-value="M">M</button>
                    <button type="button" class="sex-btn" data-value="F">W</button>
                    <button type="button" class="sex-btn" data-value="NB">NB</button>
                </div>
                <input type="hidden" id="sex" name="sex">
            </div>
            
            <!-- Age -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" class="input-block" placeholder="e.g. 25" step="1" min="0" max="120">
            </div>

            <!-- Timezone -->
            <div class="form-group">
                <label for="timezone">Timezone</label>
                <select id="timezone" class="input-block" style="background-color: #2a2a2a; color: #ffffff;">
                    <optgroup label="Americas">
                        <option value="America/New_York">America/New_York (UTC-5)</option>
                        <option value="America/Chicago">America/Chicago (UTC-6)</option>
                        <option value="America/Denver">America/Denver (UTC-7)</option>
                        <option value="America/Los_Angeles">America/Los_Angeles (UTC-8)</option>
                        <option value="America/Toronto">America/Toronto (UTC-5)</option>
                        <option value="America/Vancouver">America/Vancouver (UTC-8)</option>
                        <option value="America/Sao_Paulo">America/Sao_Paulo (UTC-3)</option>
                        <option value="America/Argentina/Buenos_Aires">America/Buenos_Aires (UTC-3)</option>
                        <option value="America/Bogota">America/Bogota (UTC-5)</option>
                        <option value="America/Mexico_City">America/Mexico_City (UTC-6)</option>
                    </optgroup>
                    <optgroup label="Europe">
                        <option value="Europe/London">Europe/London (UTC+0)</option>
                        <option value="Europe/Amsterdam">Europe/Amsterdam (UTC+1)</option>
                        <option value="Europe/Paris">Europe/Paris (UTC+1)</option>
                        <option value="Europe/Berlin">Europe/Berlin (UTC+1)</option>
                        <option value="Europe/Madrid">Europe/Madrid (UTC+1)</option>
                        <option value="Europe/Rome">Europe/Rome (UTC+1)</option>
                        <option value="Europe/Moscow">Europe/Moscow (UTC+3)</option>
                    </optgroup>
                    <optgroup label="Asia / Pacific">
                        <option value="Asia/Dubai">Asia/Dubai (UTC+4)</option>
                        <option value="Asia/Kolkata">Asia/Kolkata (UTC+5:30)</option>
                        <option value="Asia/Singapore">Asia/Singapore (UTC+8)</option>
                        <option value="Asia/Tokyo">Asia/Tokyo (UTC+9)</option>
                        <option value="Asia/Shanghai">Asia/Shanghai (UTC+8)</option>
                        <option value="Australia/Sydney">Australia/Sydney (UTC+11)</option>
                        <option value="Pacific/Auckland">Pacific/Auckland (UTC+13)</option>
                    </optgroup>
                    <optgroup label="Africa">
                        <option value="Africa/Cairo">Africa/Cairo (UTC+2)</option>
                        <option value="Africa/Johannesburg">Africa/Johannesburg (UTC+2)</option>
                        <option value="Africa/Lagos">Africa/Lagos (UTC+1)</option>
                    </optgroup>
                </select>
            </div>
            <!-- Preferred Unit -->
            <div class="form-group">
                <label>Preferred Unit</label>
                <div id="unit-buttons" style="display: flex; gap: 1rem;">
                    <button type="button" class="unit-btn" data-value="metric">Metric</button>
                    <button type="button" class="unit-btn" data-value="imperial">Imperial</button>
                </div>
                <input type="hidden" id="unit" name="unit">
            </div>
            
            <!-- Height -->
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="text" id="height" class="input-block" placeholder="170" min="0">
            </div>
            
            <!-- Weight -->
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" class="input-block" placeholder="70.50" step="0.01" min="0">
            </div>
            
            <!-- Save Button -->
            <button type="submit" class="btn-primary btn-block">SAVE</button>
        </form>
        
        <div id="message" style="margin-top: 1rem; display: none;"></div>
    </main>

    <script src="js/api.js"></script>
    <script>
        // Protect page
        requireLogin();
        
        let selectedSex = null;
        let selectedUnit = 'metric';
        
        // Load profile data on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const profile = await getUserProfile();
            
            if (profile) {
                // Populate form
                document.getElementById('email').value = profile.user_email;
                document.getElementById('name').value = profile.user_first_name || '';
                document.getElementById('age').value = profile.user_age || '';
                // Height display
                if (profile.user_height) {
                    if (profile.user_unit_preference === 'imperial') {
                        document.getElementById('height').value = cmToFeetInches(profile.user_height).display;
                    } else {
                        document.getElementById('height').value = profile.user_height;
                    }
                }

                // Weight display
                if (profile.user_weight) {
                    if (profile.user_unit_preference === 'imperial') {
                        document.getElementById('weight').value = kgToLbs(profile.user_weight);
                    } else {
                        document.getElementById('weight').value = profile.user_weight;
                    }
                }
                
                // Set sex
                if (profile.user_sex) {
                    selectedSex = profile.user_sex;
                    document.getElementById('sex').value = selectedSex;
                    highlightSexButton(selectedSex);
                }
                
                // Set unit
                if (profile.user_unit_preference) {
                    selectedUnit = profile.user_unit_preference;
                    document.getElementById('unit').value = selectedUnit;
                    highlightUnitButton(selectedUnit);
                    updateUnitLabels(selectedUnit);
                }

                // Set timezone
                if (profile.user_timezone) {
                    document.getElementById('timezone').value = profile.user_timezone;
                }
            }
        });
        
        // Sex button handlers
        document.querySelectorAll('.sex-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                selectedSex = e.target.dataset.value;
                document.getElementById('sex').value = selectedSex;
                highlightSexButton(selectedSex);
            });
        });
        
        function highlightSexButton(value) {
            document.querySelectorAll('.sex-btn').forEach(btn => {
                if (btn.dataset.value === value) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
        }
        
        // Unit button handlers
        document.querySelectorAll('.unit-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                selectedUnit = e.target.dataset.value;
                document.getElementById('unit').value = selectedUnit;
                highlightUnitButton(selectedUnit);
                updateUnitLabels(selectedUnit);
            });
        });
        
        function highlightUnitButton(value) {
            document.querySelectorAll('.unit-btn').forEach(btn => {
                if (btn.dataset.value === value) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
        }
        
        // Update height and weight labels based on selected unit
        function updateUnitLabels(unit) {
            const heightLabel = document.querySelector('label[for="height"]');
            const weightLabel = document.querySelector('label[for="weight"]');
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');

            const currentHeight = heightInput.value;
            const currentWeight = parseFloat(weightInput.value);

            if (unit === 'imperial') {
                heightLabel.textContent = "Height (ft'in\")";
                weightLabel.textContent = 'Weight (lbs)';

                // Convert height cm → feet'inches"
                const cm = parseFloat(currentHeight);
                if (!isNaN(cm) && cm > 0) {
                    heightInput.value = cmToFeetInches(cm).display;
                }
                heightInput.placeholder = "5'11\"";

                // Convert weight kg → lbs
                if (!isNaN(currentWeight) && currentWeight > 0) {
                    weightInput.value = kgToLbs(currentWeight);
                }
                weightInput.placeholder = '155';

            } else {
                heightLabel.textContent = 'Height (cm)';
                weightLabel.textContent = 'Weight (kg)';

                // Convert height feet'inches" → cm
                const parsed = parseFeetInches(currentHeight);
                if (parsed) {
                    heightInput.value = feetInchesToCm(parsed.feet, parsed.inches);
                }
                heightInput.placeholder = '170';

                // Convert weight lbs → kg
                if (!isNaN(currentWeight) && currentWeight > 0) {
                    weightInput.value = lbsToKg(currentWeight);
                }
                weightInput.placeholder = '70.5';
            }
        }    

        // ========== UNIT CONVERSION HELPERS ==========
        function cmToFeetInches(cm) {
            const totalInches = cm / 2.54;
            const feet = Math.floor(totalInches / 12);
            const inches = Math.round(totalInches % 12);
            return { feet, inches, display: `${feet}'${inches}"` };
        }

        function feetInchesToCm(feet, inches) {
            return Math.round((feet * 12 + inches) * 2.54);
        }

        function kgToLbs(kg) {
            return (kg * 2.20462).toFixed(1);
        }

        function lbsToKg(lbs) {
            return (lbs / 2.20462).toFixed(1);
        }

        function parseFeetInches(str) {
            const match = str.match(/(\d+)'(\d+)"/);
            if (match) {
                return { feet: parseInt(match[1]), inches: parseInt(match[2]) };
            }
            return null;
        }
        // Form submission
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const sex = document.getElementById('sex').value;
            const age = parseInt(document.getElementById('age').value) || null;
            const unit = document.getElementById('unit').value;
            // Convert values back to metric before saving
            let heightToSave = null;
            let weightToSave = null;

            if (selectedUnit === 'imperial') {
                const parsed = parseFeetInches(document.getElementById('height').value);
                if (parsed) {
                    heightToSave = feetInchesToCm(parsed.feet, parsed.inches);
                }
                const lbs = parseFloat(document.getElementById('weight').value);
                if (!isNaN(lbs)) {
                    weightToSave = parseFloat(lbsToKg(lbs));
                }
            } else {
                heightToSave = parseFloat(document.getElementById('height').value) || null;
                weightToSave = parseFloat(document.getElementById('weight').value) || null;
            }

            // Prepare data
            const profileData = {
                user_first_name: name || null,
                user_sex: sex || null,
                user_age: age,
                user_timezone: document.getElementById('timezone').value || 'America/New_York',
                user_unit_preference: unit || 'metric',
                user_height: heightToSave,
                user_weight: weightToSave
            };
            
            // Update profile
            const result = await updateUserProfile(profileData);
            
            if (result) {
                // Show success message
                const message = document.getElementById('message');
                message.textContent = 'Profile updated successfully!';
                message.className = 'alert alert-success';
                message.style.display = 'block';
                
                // Hide message after 3 seconds
                setTimeout(() => {
                    message.style.display = 'none';
                }, 3000);
            }
        });
        // Load user first name on page load
        document.addEventListener('DOMContentLoaded', async () => {
            let userName = getCurrentUserFirstName();
            
            // If first name not in localStorage, fetch from profile
            if (!userName) {
                const userId = getCurrentUserId();
                const profile = await getUserProfile();
                if (profile && profile.user_first_name) {
                    userName = profile.user_first_name;
                    localStorage.setItem('user_first_name', userName);
                } else {
                    userName = getCurrentUserEmail(); // Fallback to email if no first name
                }
            }
            
            if (userName) {
                document.getElementById('user-email').textContent = userName;
            }
        });
    </script>
</body>
</html>
