name: Deploy to AWS Lambda

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: fitjournal-api

jobs:
  # ===== TEST JOB — runs first; deploy is gated on it passing =====
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    # Throwaway MySQL for the test run
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: fitjournaldb_test
          MYSQL_USER: fitjournal_local
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # Test DB connection — points at the MySQL service above
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: fitjournal_local
      DB_PASSWORD: testpass
      DB_NAME: fitjournaldb_test
      SECRET_KEY: test-secret-key-not-for-production

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u fitjournal_local -ptestpass --silent; then
              echo "MySQL is up"; break
            fi
            echo "Waiting for MySQL..."; sleep 2
          done

      - name: Run tests
        run: pytest -v

  # ===== DEPLOY JOB — only runs if `test` passed =====
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test          # <-- the gate: deploy waits for test to succeed

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Lambda's Python 3.11 runtime is Amazon Linux 2 (glibc 2.26).
      # Must force manylinux2014 wheels — plain pip grabs manylinux_2_28
      # wheels (glibc 2.28+) that fail to load on Lambda (e.g. bcrypt).
      - name: Install dependencies into package/
        run: |
          pip install -r requirements.txt -t package/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all:

      - name: Assemble the deployment package
        run: |
          cp src/*.py package/
          cp -r templates package/
          cp -r static package/
          find package/ -name "__pycache__" -type d -exec rm -rf {} + || true

      - name: Create the zip
        run: |
          cd package
          zip -r ../deployment.zip . -q
          cd ..
          ls -lh deployment.zip

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::280946458595:role/fitjournal-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.FUNCTION_NAME }} \
            --zip-file fileb://deployment.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for the update to finish
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "Deploy complete."